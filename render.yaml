services:
  - type: web
    name: finance-tracker-api
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false          # Set this manually in Render dashboard to your MongoDB Atlas URI
      - key: JWT_SECRET
        generateValue: true  # Auto-generated by Render
      - key: FRONTEND_URL
        sync: false          # Set this manually in Render dashboard to your GitHub Pages URL
